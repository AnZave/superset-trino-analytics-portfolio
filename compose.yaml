services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d analytics"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  trino:
    image: trinodb/trino:476
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./trino/catalog:/etc/trino/catalog:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/v1/info >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  superset-init:
    build: ./superset
    depends_on:
      postgres:
        condition: service_healthy
      trino:
        condition: service_healthy
    environment: &superset-environment
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_DATABASE_URI: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/superset
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL}
    command: ["/app/docker-init.sh"]
    restart: "no"

  superset:
    build: ./superset
    depends_on:
      superset-init:
        condition: service_completed_successfully
    environment: *superset-environment
    ports:
      - "8088:8088"
    command: ["gunicorn", "--bind", "0.0.0.0:8088", "--workers", "2", "--timeout", "120", "superset.app:create_app()"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8088/health"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  telegram-bot:
    build: ./telegram-bot
    profiles: ["telegram"]
    depends_on:
      trino:
        condition: service_healthy
    environment:
      TRINO_HOST: trino
      TRINO_PORT: 8080
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_CHAT_ID: ${TELEGRAM_ALLOWED_CHAT_ID:-}
      TELEGRAM_DAILY_REPORT_HOUR: ${TELEGRAM_DAILY_REPORT_HOUR:-9}
      SUPERSET_PUBLIC_URL: ${SUPERSET_PUBLIC_URL:-http://127.0.0.1:8088}
    restart: unless-stopped

volumes:
  postgres_data:
